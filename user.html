<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Portal - ZenTick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-black text-white" x-data="userApp()" x-cloak>
    <div class="min-h-screen bg-black flex flex-col text-white">
        <header class="bg-zinc-950 border-b border-zinc-900 px-8 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center"><i data-lucide="ticket" class="w-5 h-5 text-black"></i></div>
                <span class="font-bold text-xl text-white tracking-tight">ZenTick <span class="text-zinc-500 font-medium">Support</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button @click="logout()" class="text-sm font-semibold text-zinc-500 hover:text-white flex items-center gap-1.5 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </button>
                <div class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-300 font-bold border border-zinc-800" x-text="user?.name?.substring(0, 2).toUpperCase() || 'US'"></div>
            </div>
        </header>

        <div class="flex-1 max-w-7xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-8 space-y-6">
                <section>
                    <h1 class="text-3xl font-bold text-white mb-1">Submit a New Request</h1>
                    <p class="text-zinc-400 text-sm">Please provide as much detail as possible so we can route your ticket correctly.</p>
                </section>

                <div class="bg-zinc-950 rounded-2xl border border-zinc-900 shadow-2xl p-8">
                    <div x-show="!submitted">
                        <form @submit.prevent="handleSubmit()" class="space-y-6">
                            
                            <div class="space-y-3">
                                <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Select Category</label>
                                <div class="grid grid-cols-3 gap-4">
                                    <button type="button" @click="userCategory = 'Hardware'" 
                                            :class="userCategory === 'Hardware' ? 'bg-blue-500/20 border-blue-500 text-blue-400' : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-zinc-700 hover:bg-zinc-800'"
                                            class="flex flex-col items-center justify-center py-6 px-4 rounded-xl border-2 transition-all gap-3">
                                        <i data-lucide="monitor" class="w-8 h-8"></i>
                                        <span class="text-sm font-bold tracking-wide">Hardware</span>
                                    </button>
                                    <button type="button" @click="userCategory = 'Software'" 
                                            :class="userCategory === 'Software' ? 'bg-purple-500/20 border-purple-500 text-purple-400' : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-zinc-700 hover:bg-zinc-800'"
                                            class="flex flex-col items-center justify-center py-6 px-4 rounded-xl border-2 transition-all gap-3">
                                        <i data-lucide="code" class="w-8 h-8"></i>
                                        <span class="text-sm font-bold tracking-wide">Software</span>
                                    </button>
                                    <button type="button" @click="userCategory = 'Network'" 
                                            :class="userCategory === 'Network' ? 'bg-cyan-500/20 border-cyan-500 text-cyan-400' : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-zinc-700 hover:bg-zinc-800'"
                                            class="flex flex-col items-center justify-center py-6 px-4 rounded-xl border-2 transition-all gap-3">
                                        <i data-lucide="globe" class="w-8 h-8"></i>
                                        <span class="text-sm font-bold tracking-wide">Network</span>
                                    </button>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Subject</label>
                                <input type="text" x-model="formData.subject" placeholder="Briefly describe the issue" class="w-full px-4 py-3 bg-zinc-900/50 border-2 border-zinc-800 rounded-xl text-base outline-none focus:bg-zinc-900 focus:border-white transition-all text-white placeholder:text-zinc-600">
                            </div>

                            <div class="space-y-2">
                                <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Detailed Description</label>
                                <textarea x-model="formData.description" rows="6" placeholder="What were you trying to do? What happened instead?" class="w-full px-4 py-3 bg-zinc-900/50 border-2 border-zinc-800 rounded-xl text-base outline-none focus:bg-zinc-900 focus:border-white transition-all resize-y text-white placeholder:text-zinc-600"></textarea>
                            </div>

                            <button type="submit" :disabled="isSubmitting" class="w-full bg-white text-black py-4 rounded-xl font-bold text-base hover:bg-zinc-200 transition-all active:scale-[0.99] flex items-center justify-center gap-3 disabled:opacity-50 mt-4 shadow-lg shadow-white/10">
                                <template x-if="!isSubmitting">
                                    <div class="flex items-center gap-2">
                                        <i data-lucide="send" class="w-5 h-5"></i>
                                        Submit Support Ticket
                                    </div>
                                </template>
                                <template x-if="isSubmitting">
                                    <div class="w-6 h-6 border-4 border-black border-t-transparent rounded-full animate-spin"></div>
                                </template>
                            </button>
                        </form>
                    </div>

                    <div x-show="submitted" class="text-center py-16">
                        <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle-2" class="w-10 h-10"></i></div>
                        <h2 class="text-3xl font-bold text-white mb-2">Ticket Submitted Successfully</h2>
                        <p class="text-zinc-400 text-base mb-8 max-w-md mx-auto">Your request has been securely logged. Our support team will review it and get back to you shortly.</p>
                        <button @click="submitted = false" class="px-6 py-3 bg-zinc-900 border border-zinc-800 text-white rounded-lg font-bold hover:bg-zinc-800 transition-colors">Submit Another Request</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <section class="flex items-center justify-between pb-2 border-b border-zinc-900">
                    <div>
                        <h2 class="text-lg font-bold text-white">Recent Tickets</h2>
                    </div>
                    <div class="flex items-center gap-1 bg-zinc-900 p-1 rounded-lg border border-zinc-800">
                        <button @click="statusFilter = 'all'" :class="statusFilter === 'all' ? 'bg-zinc-800 text-white shadow-sm' : 'text-zinc-500'" class="px-3 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all">All</button>
                        <button @click="statusFilter = 'active'" :class="statusFilter === 'active' ? 'bg-zinc-800 text-white shadow-sm' : 'text-zinc-500'" class="px-3 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all">Active</button>
                    </div>
                </section>

                <div class="grid grid-cols-1 gap-3 overflow-y-auto max-h-[700px] pr-1 custom-scrollbar">
                    <template x-for="ticket in filteredMyTickets()" :key="ticket.id">
                        <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900 hover:border-zinc-700 transition-all group cursor-pointer">
                            <div class="flex items-start justify-between mb-2">
                                <div class="flex items-center gap-2">
                                    <div :class="{
                                        'text-blue-400': ticket.category === 'Hardware',
                                        'text-purple-400': ticket.category === 'Software',
                                        'text-cyan-400': ticket.category === 'Network'
                                    }">
                                        <i data-lucide="ticket" class="w-4 h-4"></i>
                                    </div>
                                    <span class="text-[10px] font-mono text-zinc-500" x-text="ticket.id"></span>
                                </div>
                                <span :class="{
                                    'bg-blue-500/10 text-blue-400 border-blue-500/20': ticket.status === 'open',
                                    'bg-yellow-500/10 text-yellow-400 border-yellow-500/20': ticket.status === 'in-progress',
                                    'bg-emerald-500/10 text-emerald-400 border-emerald-500/20': ticket.status === 'resolved',
                                    'bg-zinc-900 text-zinc-500 border-zinc-800': ticket.status === 'closed'
                                }" class="px-2 py-0.5 rounded text-[9px] font-bold border uppercase tracking-wider" x-text="ticket.status.replace('-', ' ')"></span>
                            </div>
                            
                            <h3 class="text-sm font-bold text-white mb-1 line-clamp-1" x-text="ticket.title"></h3>
                            <p class="text-xs text-zinc-500 line-clamp-2 mb-3" x-text="ticket.description"></p>
                            
                            <div class="flex items-center justify-between text-[10px] text-zinc-600 font-medium">
                                <span class="uppercase tracking-widest" x-text="ticket.category"></span>
                                <span x-text="new Date(ticket.createdAt).toLocaleDateString(undefined, {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})"></span>
                            </div>
                        </div>
                    </template>
                    
                    <template x-if="filteredMyTickets().length === 0">
                        <div class="text-center py-12 bg-zinc-950/50 rounded-xl border border-dashed border-zinc-800">
                            <div class="w-12 h-12 bg-zinc-900 rounded-full flex items-center justify-center mx-auto mb-3 text-zinc-600">
                                <i data-lucide="inbox" class="w-6 h-6"></i>
                            </div>
                            <p class="text-zinc-400 text-sm font-medium">No tickets found</p>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
        function userApp() {
            return {
                user: null,
                submitted: false,
                isSubmitting: false,
                userCategory: 'Hardware',
                statusFilter: 'all',
                formData: {
                    subject: '',
                    description: ''
                },
                myTickets: [],
                filteredMyTickets() {
                    return this.myTickets.filter(t => {
                        if (this.statusFilter === 'active') return t.status === 'open' || t.status === 'in-progress';
                        return true;
                    });
                },
                async fetchMyTickets() {
                    try {
                        const response = await fetch('api.php');
                        if (response.ok) {
                            const allTickets = await response.json();
                            this.myTickets = allTickets.filter(t => t.creator === this.user.name);
                            this.$nextTick(() => lucide.createIcons());
                        }
                    } catch (e) { console.error('Failed to fetch tickets:', e); }
                },
                async handleSubmit() {
                    this.isSubmitting = true;
                    const newTicket = {
                        id: 'T-' + Math.floor(Math.random() * 10000),
                        title: this.formData.subject,
                        creator: this.user.name,
                        status: 'open',
                        priority: 'medium',
                        category: this.userCategory,
                        description: this.formData.description,
                        createdAt: new Date().toISOString()
                    };

                    try {
                        const response = await fetch('api.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newTicket)
                        });
                        if (response.ok) {
                            this.submitted = true;
                            this.formData = { subject: '', description: '' };
                            await this.fetchMyTickets();
                        }
                    } catch (e) { console.error('Failed to submit ticket:', e); }
                    
                    this.isSubmitting = false;
                },
                logout() {
                    localStorage.removeItem('zentick_user');
                    window.location.href = 'login.html';
                },
                init() {
                    const userData = localStorage.getItem('zentick_user');
                    if (!userData) {
                        window.location.href = 'login.html';
                        return;
                    }
                    this.user = JSON.parse(userData);
                    this.fetchMyTickets();
                    lucide.createIcons();
                }
            }
        }
    </script>
</body>
</html>
